name: user-statistician
on:
  schedule: [{cron: "0 3 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: cicirello/user-statistician@v1
        with:
          image-file: github-metrics.svg
          colors: dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
